<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exile Clash - Multiplayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            background: url('img/bg/darkd.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            transition: background-image 0.3s ease;
            color: #fff;
        }
        body.light {
            background-image: url('img/bg/lightd.png');
            color: #000;
        }
        @media (max-width: 1024px) {
            body { background-image: url('img/bg/darkp.png'); }
            body.light { background-image: url('img/bg/lightp.png'); }
        }
        .glass {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3.7px);
            -webkit-backdrop-filter: blur(3.7px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        body.light .glass {
            background: rgba(255, 255, 0.17);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 100;
        }
        .logo {
            font-size: clamp(24px, 4vw, 32px); font-weight: 900;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 12px; align-items: center; }
        .icon-btn {
            width: 45px; height: 45px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        body.light .icon-btn { color: #000; }
        .container {
            position: relative; padding: 120px 20px 40px;
            max-width: 1200px; margin: 0 auto; min-height: 100vh;
        }
        .lobby-section { margin-bottom: 30px; }
        .section-title {
            font-size: clamp(20px, 3vw, 28px); font-weight: 900;
            margin-bottom: 20px; text-align: center;
            color: #f093fb; text-shadow: 0 2px 8px rgba(240,147,251,0.5);
        }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: clamp(20px, 4vw, 30px); margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-weight: 700; margin-bottom: 8px;
            font-size: clamp(14px, 2vw, 16px); opacity: 0.9;
        }
        input[type="text"] {
            width: 100%; padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08); border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px; color: #fff; font-size: clamp(14px, 2vw, 16px);
            font-family: 'Poppins', sans-serif; transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none; border-color: #f093fb;
            background: rgba(255, 255, 255, 0.12);
        }
        body.light input[type="text"] { color: #000; }
        .checkbox-group {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }
        input[type="checkbox"] {
            width: 20px; height: 20px; cursor: pointer;
        }
        .btn {
            width: 100%; padding: clamp(14px, 2vw, 16px);
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none; border-radius: 12px; color: #fff;
            font-size: clamp(15px, 2.2vw, 17px); font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-danger { background: linear-gradient(135deg, #f5576c, #f093fb); }
        .lobby-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .lobby-item {
            background: rgba(255, 255, 255, 0.08); border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s;
        }
        .lobby-item:hover { background: rgba(255, 255, 255, 0.12); border-color: #f093fb; transform: translateY(-5px); }
        .lobby-name { font-weight: 700; font-size: clamp(16px, 2.5vw, 18px); margin-bottom: 8px; }
        .lobby-info { display: flex; justify-content: space-between; opacity: 0.7; font-size: clamp(12px, 1.8vw, 14px); }
        .current-lobby {
            background: rgba(240, 147, 251, 0.15); border: 2px solid #f093fb;
            border-radius: 20px; padding: clamp(20px, 4vw, 30px); margin-bottom: 20px;
        }
        .lobby-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }
        .lobby-title { font-size: clamp(18px, 3vw, 24px); font-weight: 900; }
        .lobby-code-display {
            background: rgba(255, 255, 255, 0.1); padding: 8px 16px;
            border-radius: 8px; font-weight: 700; letter-spacing: 2px;
        }
        .players-list { display: grid; gap: 12px; margin-bottom: 20px; }
        .player-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 12px 16px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .player-item.host { border-color: #f093fb; }
        .player-item.you { border-color: #4fc3f7; }
        .player-item.bot { border-color: #ff9800; opacity: 0.8; }
        .player-name { font-weight: 700; }
        .player-badge {
            background: #f093fb; color: #fff; padding: 4px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 700;
        }
        .player-badge.you { background: #4fc3f7; }
        .player-badge.bot { background: #ff9800; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bot-controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;
        }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px;
            padding: clamp(30px, 5vw, 40px); text-align: center; max-width: 400px;
        }
        .modal h2 { font-size: clamp(24px, 4vw, 32px); margin-bottom: 20px; }
        .empty-state {
            text-align: center; padding: 40px 20px; opacity: 0.5;
            font-size: clamp(14px, 2vw, 16px);
        }
        @media (max-width: 768px) {
            .action-buttons, .bot-controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header glass">
        <div class="logo">Exile Clash</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
            <button class="icon-btn" onclick="showSettings()"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <div class="container">
        <div id="main-menu">
            <div class="lobby-section">
                <div class="section-title"><i class="fa-solid fa-plus"></i> Create Lobby</div>
                <div class="card glass">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="player-name" placeholder="Enter your name" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>Lobby Name</label>
                        <input type="text" id="lobby-name" placeholder="My Awesome Lobby" maxlength="30">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="is-public" checked>
                        <label for="is-public">Public Lobby</label>
                    </div>
                    <button class="btn" onclick="createLobby()"><i class="fa-solid fa-rocket"></i> Create Lobby</button>
                </div>
            </div>

            <div class="lobby-section">
                <div class="section-title"><i class="fa-solid fa-users"></i> Join Lobby</div>
                <div class="card glass">
                    <div class="form-group">
                        <label>Lobby Code</label>
                        <input type="text" id="join-code" placeholder="ABC123" maxlength="6" style="text-transform: uppercase;">
                    </div>
                    <button class="btn" onclick="joinLobbyByCode()"><i class="fa-solid fa-right-to-bracket"></i> Join</button>
                </div>
            </div>

            <div class="lobby-section">
                <div class="section-title"><i class="fa-solid fa-globe"></i> Public Lobbies</div>
                <div class="card glass">
                    <div class="lobby-list" id="public-lobbies">
                        <div class="empty-state">Loading lobbies...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="lobby-view" style="display: none;">
            <div class="current-lobby glass">
                <div class="lobby-header">
                    <div class="lobby-title" id="current-lobby-name">Lobby Name</div>
                    <div class="lobby-code-display">Code: <span id="current-lobby-code">------</span></div>
                </div>

                <div class="players-list" id="players-list"></div>

                <div id="host-controls" style="display: none;">
                    <div class="bot-controls">
                        <button class="btn btn-secondary" onclick="addBot()"><i class="fa-solid fa-robot"></i> Add Bot</button>
                        <button class="btn btn-secondary" onclick="removeBot()"><i class="fa-solid fa-user-minus"></i> Remove Bot</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn" id="start-game-btn" onclick="startGame()"><i class="fa-solid fa-play"></i> Start Game</button>
                        <button class="btn btn-danger" onclick="deleteLobby()"><i class="fa-solid fa-trash"></i> Delete Lobby</button>
                    </div>
                </div>

                <div id="player-controls" style="display: none;">
                    <button class="btn btn-secondary" onclick="leaveLobby()"><i class="fa-solid fa-door-open"></i> Leave Lobby</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="settings-modal">
        <div class="modal-content glass">
            <h2><i class="fa-solid fa-gear"></i> Settings</h2>
            <p style="margin-bottom: 25px; opacity: 0.8;">More settings coming soon!</p>
            <button class="btn" onclick="closeSettings()"><i class="fa-solid fa-check"></i> Close</button>
        </div>
    </div>

    <script>
        const API = '/api/game';
        let currentLobby = null;
        let userId = localStorage.getItem('exile_uid');
        let playerName = localStorage.getItem('exile_player_name') || '';
        let pusher = null;
        let channel = null;
        let heartbeatInterval = null;

        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('exile_uid', userId);
        }

        document.getElementById('player-name').value = playerName;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            document.getElementById('theme-icon').className = 'fa-solid fa-sun';
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            document.getElementById('theme-icon').className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function showSettings() {
            document.getElementById('settings-modal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
        }

        async function apiCall(action, data = {}) {
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...data })
                });
                return await res.json();
            } catch (e) {
                console.error('API Error:', e);
                return { error: 'Network error' };
            }
        }

        function initPusher() {
            if (pusher) return;
            pusher = new Pusher('52d629612765e85a5546', {
                cluster: 'ap2',
                authEndpoint: '/api/pusher/auth',
                auth: { params: { user_info: JSON.stringify({ user_id: userId, username: playerName }) } }
            });
        }

        function subscribeToLobby(lobbyId) {
            if (channel) pusher.unsubscribe(channel.name);
            channel = pusher.subscribe(`game-${lobbyId}`);
            channel.bind('state-update', () => loadLobbyState());
            channel.bind('game-started', () => {
                window.location.href = `/game.html?code=${lobbyId}`;
            });
            channel.bind('lobby-deleted', () => {
                alert('Lobby was deleted by host');
                leaveLobbyLocal();
            });
        }

        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                if (currentLobby) {
                    apiCall('get_state', { lobby_id: currentLobby });
                }
            }, 10000); // Every 10s to show host is online
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }

        async function createLobby() {
            const name = document.getElementById('player-name').value.trim();
            const lobbyName = document.getElementById('lobby-name').value.trim();
            const isPublic = document.getElementById('is-public').checked;

            if (!name) {
                alert('Please enter your name');
                return;
            }
            if (name.length < 2) {
                alert('Name too short');
                return;
            }

            playerName = name;
            localStorage.setItem('exile_player_name', name);

            const res = await apiCall('create_lobby', {
                uid: userId,
                name: lobbyName || 'Exile Clash',
                is_public: isPublic ? 1 : 0,
                player_name: name
            });

            if (res.error) {
                alert(res.error);
                return;
            }

            currentLobby = res.lobby_id;
            initPusher();
            subscribeToLobby(res.lobby_id);
            startHeartbeat();
            showLobbyView();
            loadLobbyState();
        }

        async function joinLobbyByCode() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            const name = document.getElementById('player-name').value.trim();

            if (!name) {
                alert('Please enter your name');
                return;
            }
            if (!code) {
                alert('Please enter lobby code');
                return;
            }

            playerName = name;
            localStorage.setItem('exile_player_name', name);

            await joinLobby(code);
        }

        async function joinLobby(lobbyId) {
            const res = await apiCall('join_lobby', {
                lobby_id: lobbyId,
                uid: userId,
                player_name: playerName
            });

            if (res.error) {
                alert(res.error);
                return;
            }

            currentLobby = lobbyId;
            initPusher();
            subscribeToLobby(lobbyId);
            startHeartbeat();
            showLobbyView();
            loadLobbyState();
        }

        async function loadLobbyState() {
            if (!currentLobby) return;

            const res = await apiCall('get_state', { lobby_id: currentLobby });
            if (res.error) {
                alert(res.error);
                leaveLobbyLocal();
                return;
            }

            const lobby = res.lobby;
            document.getElementById('current-lobby-name').textContent = lobby.name;
            document.getElementById('current-lobby-code').textContent = lobby._id;

            const isHost = lobby.host_uid === userId;
            document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
            document.getElementById('player-controls').style.display = isHost ? 'none' : 'block';
            document.getElementById('start-game-btn').disabled = lobby.players.length < 2;

            renderPlayers(lobby.players, isHost);
        }

        function renderPlayers(players, isHost) {
            const list = document.getElementById('players-list');
            list.innerHTML = players.map(p => {
                const isYou = p.uid === userId;
                const isPlayerHost = p.uid === players.find(pl => pl.uid === gameState?.host_uid)?.uid;
                const isBot = p.uid.startsWith('bot_');
                return `
                    <div class="player-item ${isPlayerHost ? 'host' : ''} ${isYou ? 'you' : ''} ${isBot ? 'bot' : ''}">
                        <div class="player-name">${p.name}</div>
                        ${isPlayerHost ? '<div class="player-badge">HOST</div>' : ''}
                        ${isYou && !isPlayerHost ? '<div class="player-badge you">YOU</div>' : ''}
                        ${isBot ? '<div class="player-badge bot">BOT</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        function showLobbyView() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('lobby-view').style.display = 'block';
        }

        function leaveLobbyLocal() {
            stopHeartbeat();
            currentLobby = null;
            if (channel) pusher.unsubscribe(channel.name);
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('lobby-view').style.display = 'none';
            loadPublicLobbies();
        }

        async function leaveLobby() {
            if (!currentLobby) return;
            if (confirm('Leave this lobby?')) {
                // For now just disconnect - proper leave API can be added
                leaveLobbyLocal();
            }
        }

        async function deleteLobby() {
            if (!currentLobby) return;
            if (!confirm('Delete this lobby? All players will be kicked.')) return;

            const res = await apiCall('delete_lobby', {
                lobby_id: currentLobby,
                admin_token: 'admin_token_exile_1234'
            });

            if (res.error) {
                alert(res.error);
                return;
            }

            leaveLobbyLocal();
        }

        async function addBot() {
            if (!currentLobby) return;
            const botName = 'Bot_' + Math.floor(Math.random() * 1000);
            const botId = 'bot_' + Math.random().toString(36).substring(2, 15);

            const res = await apiCall('join_lobby', {
                lobby_id: currentLobby,
                uid: botId,
                player_name: botName
            });

            if (res.error) alert(res.error);
        }

        async function removeBot() {
            // This would need a backend endpoint - for now just reload
            loadLobbyState();
            alert('Bot removal: Kick feature coming soon. Bots auto-remove when lobby is full.');
        }

        async function startGame() {
            if (!currentLobby) return;
            const res = await apiCall('start_game', { lobby_id: currentLobby });
            if (res.error) {
                alert(res.error);
            }
        }

        async function loadPublicLobbies() {
            const res = await apiCall('get_public_lobbies');
            const list = document.getElementById('public-lobbies');

            if (res.error || !res.lobbies || res.lobbies.length === 0) {
                list.innerHTML = '<div class="empty-state">No public lobbies available</div>';
                return;
            }

            list.innerHTML = res.lobbies.map(l => `
                <div class="lobby-item" onclick="joinLobby('${l._id}')">
                    <div class="lobby-name">${l.name}</div>
                    <div class="lobby-info">
                        <span><i class="fa-solid fa-users"></i> ${l.players.length}/6</span>
                        <span><i class="fa-solid fa-key"></i> ${l._id}</span>
                    </div>
                </div>
            `).join('');
        }

        loadPublicLobbies();
        setInterval(loadPublicLobbies, 5000);
    </script>
</body>
</html>

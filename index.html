<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exile Clash - Lobby</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .tab.active {
            background: rgba(96, 165, 250, 0.2);
            border-color: #60a5fa;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .checkbox-wrap input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .lobby-list {
            margin-top: 20px;
        }
        .lobby-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lobby-item:hover {
            background: rgba(15, 23, 42, 0.9);
            border-color: #60a5fa;
        }
        .lobby-info h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .lobby-info p {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }
        .error.show { display: block; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚔️ Exile Clash</h1>
            <p class="subtitle">Battle for survival on the islands</p>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('create')">Create</div>
                <div class="tab" onclick="switchTab('join')">Join</div>
                <div class="tab" onclick="switchTab('browse')">Browse</div>
            </div>

            <div id="error" class="error"></div>

            <!-- Create Tab -->
            <div id="create-tab" class="tab-content active">
                <input type="text" id="create-name" placeholder="Your Name" maxlength="20">
                <input type="text" id="create-lobby-name" placeholder="Lobby Name (Optional)" maxlength="30">
                <div class="checkbox-wrap">
                    <input type="checkbox" id="create-public" checked>
                    <label for="create-public">Public Lobby</label>
                </div>
                <button onclick="createLobby()">Create Lobby</button>
            </div>

            <!-- Join Tab -->
            <div id="join-tab" class="tab-content">
                <input type="text" id="join-name" placeholder="Your Name" maxlength="20">
                <input type="text" id="join-code" placeholder="Lobby Code" maxlength="6" style="text-transform: uppercase;">
                <button onclick="joinLobby()">Join Lobby</button>
            </div>

            <!-- Browse Tab -->
            <div id="browse-tab" class="tab-content">
                <input type="text" id="browse-name" placeholder="Your Name" maxlength="20">
                <button onclick="loadPublicLobbies()">Refresh Lobbies</button>
                <div id="lobby-list" class="lobby-list"></div>
            </div>
        </div>
    </div>

    <script>
        let uid = localStorage.getItem('exile_uid') || generateUID();
        localStorage.setItem('exile_uid', uid);

        function generateUID() {
            return 'user_' + Math.random().toString(36).substring(2, 15);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        async function createLobby() {
            const name = document.getElementById('create-name').value.trim();
            const lobbyName = document.getElementById('create-lobby-name').value.trim();
            const isPublic = document.getElementById('create-public').checked? 1 : 0;

            if (!name) return showError('Enter your name');

            hideError();
            try {
                const res = await fetch('/api/game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'create_lobby',
                        uid,
                        name: lobbyName || 'Exile Clash',
                        is_public: isPublic,
                        player_name: name
                    })
                });
                const data = await res.json();
                if (data.error) return showError(data.error);
                localStorage.setItem('exile_name', name);
                window.location.href = `/game?code=${data.lobby_id}`;
            } catch (e) {
                showError('Failed to create lobby');
            }
        }

        async function joinLobby() {
            const name = document.getElementById('join-name').value.trim();
            const code = document.getElementById('join-code').value.trim().toUpperCase();

            if (!name) return showError('Enter your name');
            if (!code) return showError('Enter lobby code');

            hideError();
            try {
                const res = await fetch('/api/game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'join_lobby',
                        lobby_id: code,
                        uid,
                        player_name: name
                    })
                });
                const data = await res.json();
                if (data.error) return showError(data.error);
                localStorage.setItem('exile_name', name);
                window.location.href = `/game?code=${code}`;
            } catch (e) {
                showError('Failed to join lobby');
            }
        }

        async function loadPublicLobbies() {
            const name = document.getElementById('browse-name').value.trim();
            if (!name) return showError('Enter your name first');

            hideError();
            const list = document.getElementById('lobby-list');
            list.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const res = await fetch('/api/game?action=get_public_lobbies');
                const data = await res.json();

                if (!data.lobbies || data.lobbies.length === 0) {
                    list.innerHTML = '<div class="loading">No public lobbies found</div>';
                    return;
                }

                list.innerHTML = data.lobbies.map(lobby => `
                    <div class="lobby-item" onclick="joinPublicLobby('${lobby._id}', '${name}')">
                        <div class="lobby-info">
                            <h3>${lobby.name}</h3>
                            <p>${lobby.players.length}/6 players</p>
                        </div>
                        <div>→</div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="loading">Failed to load lobbies</div>';
            }
        }

        async function joinPublicLobby(lobbyId, name) {
            try {
                const res = await fetch('/api/game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'join_lobby',
                        lobby_id: lobbyId,
                        uid,
                        player_name: name
                    })
                });
                const data = await res.json();
                if (data.error) return showError(data.error);
                localStorage.setItem('exile_name', name);
                window.location.href = `/game?code=${lobbyId}`;
            } catch (e) {
                showError('Failed to join lobby');
            }
        }

        // Auto-fill saved name
        const savedName = localStorage.getItem('exile_name');
        if (savedName) {
            document.getElementById('create-name').value = savedName;
            document.getElementById('join-name').value = savedName;
            document.getElementById('browse-name').value = savedName;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exile Clash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: url('img/bg/darkd.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            transition: background-image 0.3s ease;
            color: #fff;
        }
        body.light {
            background-image: url('img/bg/lightd.png');
            color: #000;
        }
        @media (max-width: 1024px) {
            body { background-image: url('img/bg/darkp.png'); }
            body.light { background-image: url('img/bg/lightp.png'); }
        }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-bar-container {
            width: 200px; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; overflow: hidden;
        }
        .loading-bar {
            width: 0%; height: 100%; background: #fff;
            animation: load 2s ease-in-out forwards;
        }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .glass {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3.7px);
            -webkit-backdrop-filter: blur(3.7px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        body.light .glass {
            background: rgba(255, 255, 255, 0.17);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .top-bar {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 100;
        }
        .logo {
            color: #fff; font-size: clamp(16px, 3vw, 20px); font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        body.light .logo { color: #000; text-shadow: 0 2px 4px rgba(255,255,255,0.3); }
        .theme-btn {
            color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer;
            font-size: clamp(12px, 2.5vw, 14px); transition: all 0.3s ease;
            border: none; font-family: 'Poppins', sans-serif; font-weight: 700;
        }
        body.light .theme-btn { color: #000; }
        .theme-btn:hover { transform: translateY(-1px); }
        .page-wrapper {
            position: fixed; top: 100px; left: 20px; right: 20px; bottom: 20px;
            padding: clamp(20px, 4vw, 40px); display: flex; justify-content: center; align-items: center;
        }
        .content {
            display: flex; align-items: center; gap: clamp(30px, 8vw, 80px);
            width: 100%; max-width: 1200px; justify-content: center;
        }
        @media (max-width: 1024px) {
            .content { flex-direction: column; gap: clamp(30px, 6vw, 50px); }
        }
        .title-wrapper { display: flex; flex-direction: column; align-items: flex-start; line-height: 0.85; }
        .game-title {
            font-size: clamp(42px, 9vw, 90px); font-weight: 900; color: #fff;
            letter-spacing: clamp(2px, 0.8vw, 8px); text-shadow: 0 6px 20px rgba(0,0,0,0.6);
            font-stretch: ultra-condensed;
        }
        body.light .game-title { color: #000; text-shadow: 0 6px 20px rgba(255,255,255,0.4); }
        .game-title.exile { letter-spacing: clamp(3px, 1vw, 10px); }
        .game-title.clash { letter-spacing: clamp(2px, 0.9vw, 8px); }
        @media (max-width: 1024px) {
            .title-wrapper { align-items: center; }
            .game-title { text-align: center; }
        }
        .input-section { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: clamp(20px, 3vw, 30px); }
        .name-input {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); border-radius: 12px;
            padding: clamp(14px, 2vw, 16px) clamp(20px, 3vw, 24px); font-size: clamp(16px, 2.5vw, 18px);
            color: #fff; width: clamp(280px, 50vw, 320px); text-align: center; outline: none;
            transition: all 0.3s ease; font-family: 'Poppins', sans-serif;
        }
        .name-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .name-input:focus {
            background: rgba(255, 255, 255, 0.25); border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        body.light .name-input {
            background: rgba(0, 0, 0, 0.1); border: 1px solid rgba(0, 0, 0, 0.2); color: #000;
        }
        body.light .name-input::placeholder { color: rgba(0, 0, 0, 0.5); }
        body.light .name-input:focus {
            background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .btn-group { display: flex; gap: 16px; width: clamp(280px, 50vw, 320px); }
        @media (max-width: 480px) { .btn-group { flex-direction: column; width: 100%; } }
        .btn {
            flex: 1; padding: clamp(12px, 2vw, 14px) clamp(16px, 3vw, 20px);
            font-size: clamp(14px, 2.5vw, 16px); font-weight: 700; color: #fff; cursor: pointer;
            transition: all 0.3s ease; text-shadow: 0 2px 4px rgba(0,0,0,0.3); border: none;
            font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        body.light .btn { color: #000; text-shadow: 0 2px 4px rgba(255,255,255,0.3); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: rgba(76, 175, 80, 0.3); }
        .btn-primary:hover { background: rgba(76, 175, 80, 0.5); }
        .btn-danger { background: rgba(245, 87, 108, 0.3); }
        .btn-danger:hover { background: rgba(245, 87, 108, 0.5); }
        .hidden { display: none !important; }
        .error { color: #ff5555; font-size: 14px; text-align: center; margin-top: -10px; }
        .stats { text-align: center; opacity: 0.8; font-size: 14px; margin-top: 10px; }
        .code-input { text-transform: uppercase; }
        .lobby-list { max-height: 200px; overflow-y: auto; width: 100%; margin-top: 15px; }
        .lobby-item {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 10px 15px; margin-bottom: 8px; cursor: pointer;
            transition: all 0.3s; display: flex; justify-content: space-between; align-items: center;
        }
        .lobby-item:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); }
        .bot-badge {
            background: #ff9800; color: #fff; padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 700; margin-left: 8px;
        }
        .host-badge {
            background: #f093fb; color: #fff; padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 700; margin-left: 8px;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); color: #fff; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; z-index: 2000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .checkbox-group {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }
        input[type="checkbox"] {
            width: 20px; height: 20px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <div class="top-bar glass">
        <div class="logo"><i class="fa-solid fa-khanda"></i> Exile Clash</div>
        <button class="theme-btn glass" onclick="toggleTheme()"><i class="fa-solid fa-sun"></i> Theme</button>
    </div>

    <div class="page-wrapper glass">
        <div class="content">
            <div class="title-wrapper">
                <div class="game-title exile">EXILE</div>
                <div class="game-title clash">CLASH</div>
            </div>
            <div class="input-section" id="nameSection">
                <input type="text" class="name-input" id="playerName" placeholder="Enter Your Name" maxlength="20">
                <div class="btn-group">
                    <button class="btn btn-primary glass" onclick="enterLobby()">
                        <i class="fa-solid fa-gamepad"></i> Enter the Arena
                    </button>
                    <button class="btn glass" onclick="showCredits()">
                        <i class="fa-solid fa-star"></i> Credits
                    </button>
                </div>
                <div class="error" id="nameError"></div>
            </div>

            <div class="input-section hidden" id="lobbySection">
                <div style="font-size:20px;font-weight:900;text-align:center;">BATTLE LOBBY</div>
                <input type="text" class="name-input" id="lobbyNameInput" placeholder="Enter Lobby Name" maxlength="30">
                <button class="btn btn-primary glass" onclick="createBattle()">
                    <i class="fa-solid fa-khanda"></i> Create Battle
                </button>
                <div class="btn-group">
                    <input type="text" class="name-input code-input" id="battleCode" placeholder="BATTLE CODE" maxlength="6">
                    <button class="btn glass" onclick="joinBattle()" style="flex:0;padding:0 16px;">
                        <i class="fa-solid fa-right-to-bracket"></i>
                    </button>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="isPublic" checked>
                    <label for="isPublic">Public Lobby</label>
                </div>
                <div class="lobby-list" id="publicLobbies"></div>
                <div class="stats"><i class="fa-solid fa-users"></i> <span id="onlineCount">0</span> Warriors Online</div>
                <div class="error" id="lobbyError"></div>
            </div>

            <div class="input-section hidden" id="currentLobbySection">
                <div style="font-size:20px;font-weight:900;text-align:center;" id="lobbyTitle">Lobby</div>
                <div style="font-size:14px;opacity:0.8;text-align:center;">Code: <span id="lobbyCodeDisplay" style="font-weight:700;letter-spacing:2px;">------</span></div>
                <div class="lobby-list" id="playersList" style="max-height:150px;"></div>
                
                <div id="hostControls" class="hidden">
                    <div class="btn-group" style="margin-bottom:12px;">
                        <button class="btn glass" onclick="addBot()" style="font-size:13px;">
                            <i class="fa-solid fa-robot"></i> Add Bot
                        </button>
                        <button class="btn glass" onclick="removeBot()" style="font-size:13px;">
                            <i class="fa-solid fa-user-minus"></i> Remove Bot
                        </button>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary glass" onclick="startGame()" id="startBtn">
                            <i class="fa-solid fa-play"></i> Start Game
                        </button>
                        <button class="btn btn-danger glass" onclick="deleteLobby()">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>
                </div>

                <div id="playerControls" class="hidden">
                    <button class="btn glass" onclick="leaveLobby()">
                        <i class="fa-solid fa-door-open"></i> Leave Lobby
                    </button>
                </div>
                <div class="error" id="gameError"></div>
            </div>
        </div>
    </div>

    <script>
        const PUSHER_KEY = '52d629612765e85a5546';
        const PUSHER_CLUSTER = 'ap2';
        const API = '/api/game';
        let pusher, globalChannel, gameChannel, playerName = '', userId = localStorage.getItem('exile_uid') || Math.random().toString(36).substring(7);
        let currentLobby = null, isHost = false;
        localStorage.setItem('exile_uid', userId);

        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2200);
        });

        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.querySelector('.theme-btn');
            if (document.body.classList.contains('light')) {
                btn.innerHTML = '<i class="fa-solid fa-moon"></i> Theme';
                localStorage.setItem('theme', 'light');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-sun"></i> Theme';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            document.querySelector('.theme-btn').innerHTML = '<i class="fa-solid fa-moon"></i> Theme';
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function enterLobby() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                document.getElementById('nameError').textContent = 'Please enter your name!';
                return;
            }
            playerName = name;
            localStorage.setItem('exile_player_name', playerName);
            document.getElementById('nameSection').classList.add('hidden');
            document.getElementById('lobbySection').classList.remove('hidden');
            initPusher();
            loadPublicLobbies();
            setInterval(loadPublicLobbies, 5000);
        }

        function initPusher() {
            pusher = new Pusher(PUSHER_KEY, {
                cluster: PUSHER_CLUSTER,
                authEndpoint: '/api/pusher/auth',
                auth: { params: { user_info: JSON.stringify({ user_id: userId, username: playerName }) } }
            });

            globalChannel = pusher.subscribe('presence-global');
            globalChannel.bind('pusher:subscription_succeeded', (m) => document.getElementById('onlineCount').textContent = m.count);
            globalChannel.bind('pusher:member_added', () => document.getElementById('onlineCount').textContent = globalChannel.members.count);
            globalChannel.bind('pusher:member_removed', () => document.getElementById('onlineCount').textContent = globalChannel.members.count);
            globalChannel.bind('lobby-deleted', (data) => {
                if (currentLobby === data.lobby_id) {
                    showToast('Lobby deleted by host');
                    leaveLobbyLocal();
                }
                loadPublicLobbies();
            });
        }

        async function createBattle() {
            const lobbyName = document.getElementById('lobbyNameInput').value.trim();
            const isPublic = document.getElementById('isPublic').checked;
            
            if (!lobbyName) {
                document.getElementById('lobbyError').textContent = 'Please enter a lobby name!';
                return;
            }
            if (lobbyName.length < 3) {
                document.getElementById('lobbyError').textContent = 'Lobby name too short!';
                return;
            }

            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'create_lobby',
                    uid: userId,
                    name: lobbyName,
                    is_public: isPublic ? 1 : 0,
                    player_name: playerName
                })
            });
            const data = await res.json();
            if (data.success) {
                joinGameLobby(data.lobby_id, true);
            } else {
                document.getElementById('lobbyError').textContent = data.error || 'Failed to create';
            }
        }

        async function joinBattle() {
            const code = document.getElementById('battleCode').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                document.getElementById('lobbyError').textContent = 'Enter valid 6-char code!';
                return;
            }
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'join_lobby',
                    lobby_id: code,
                    uid: userId,
                    player_name: playerName
                })
            });
            const data = await res.json();
            if (data.success) {
                joinGameLobby(code, false);
            } else {
                document.getElementById('lobbyError').textContent = data.error || 'Failed to join';
            }
        }

        function joinGameLobby(lobbyId, host) {
            currentLobby = lobbyId;
            isHost = host;
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('currentLobbySection').classList.remove('hidden');
            document.getElementById('lobbyCodeDisplay').textContent = lobbyId;
            document.getElementById('hostControls').classList.toggle('hidden', !host);
            document.getElementById('playerControls').classList.toggle('hidden', host);
            
            if (gameChannel) pusher.unsubscribe(gameChannel.name);
            gameChannel = pusher.subscribe(`game-${lobbyId}`);
            gameChannel.bind('state-update', () => loadLobbyState());
            gameChannel.bind('game-started', () => {
                window.location.href = `/game.html?code=${lobbyId}`;
            });
            gameChannel.bind('host-transferred', (data) => {
                if (data.new_host === userId) {
                    isHost = true;
                    showToast('You are now the host');
                    document.getElementById('hostControls').classList.remove('hidden');
                    document.getElementById('playerControls').classList.add('hidden');
                }
            });
            
            loadLobbyState();
            setInterval(loadLobbyState, 3000);
        }

        async function loadLobbyState() {
            if (!currentLobby) return;
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_state', lobby_id: currentLobby })
            });
            const data = await res.json();
            if (data.error) {
                showToast(data.error);
                leaveLobbyLocal();
                return;
            }
            const lobby = data.lobby;
            document.getElementById('lobbyTitle').textContent = lobby.name;
            isHost = lobby.host_uid === userId;
            document.getElementById('hostControls').classList.toggle('hidden', !isHost);
            document.getElementById('playerControls').classList.toggle('hidden', isHost);
            document.getElementById('startBtn').disabled = lobby.players.length < 2;
            
            const list = document.getElementById('playersList');
            list.innerHTML = lobby.players.map(p => `
                <div class="lobby-item">
                    <span>${p.name} ${p.uid === lobby.host_uid ? '<span class="host-badge">HOST</span>' : ''} ${p.uid.startsWith('bot_') ? '<span class="bot-badge">BOT</span>' : ''}</span>
                </div>
            `).join('');
        }

        async function addBot() {
            if (!currentLobby || !isHost) return;
            const botName = 'Bot_' + Math.floor(Math.random() * 1000);
            const botId = 'bot_' + Math.random().toString(36).substring(2, 15);
            
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'join_lobby',
                    lobby_id: currentLobby,
                    uid: botId,
                    player_name: botName
                })
            });
            const data = await res.json();
            if (data.error) showToast(data.error);
        }

        async function removeBot() {
            showToast('Bots auto-remove when lobby is full or game starts');
        }

        async function deleteLobby() {
            if (!currentLobby || !isHost) return;
            if (!confirm('Delete this lobby? All players will be kicked.')) return;
            
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'delete_lobby',
                    lobby_id: currentLobby,
                    admin_token: 'admin_token_exile_1234'
                })
            });
            const data = await res.json();
            if (data.error) showToast(data.error);
        }

        async function startGame() {
            if (!currentLobby || !isHost) return;
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'start_game', lobby_id: currentLobby })
            });
            const data = await res.json();
            if (data.error) showToast(data.error);
        }

        function leaveLobby() {
            leaveLobbyLocal();
        }

        function leaveLobbyLocal() {
            currentLobby = null;
            isHost = false;
            if (gameChannel) pusher.unsubscribe(gameChannel.name);
            document.getElementById('currentLobbySection').classList.add('hidden');
            document.getElementById('lobbySection').classList.remove('hidden');
        }

        async function loadPublicLobbies() {
            try {
                const res = await fetch(`${API}?action=get_public_lobbies`);
                const data = await res.json();
                const list = document.getElementById('publicLobbies');
                if (!data.lobbies || data.lobbies.length === 0) {
                    list.innerHTML = '<div style="text-align:center;opacity:0.6;font-size:14px;">No public battles</div>';
                    return;
                }
                list.innerHTML = data.lobbies.map(l => `
                    <div class="lobby-item" onclick="quickJoin('${l._id}')">
                        <span style="font-weight:700;">${l.name}</span>
                        <span style="opacity:0.7;font-size:14px;">${l.players.length}/6</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        function quickJoin(code) {
            document.getElementById('battleCode').value = code;
            joinBattle();
        }

        function showCredits() {
            alert('Exile Clash - Real-time RPS Battle\nBuilt with MongoDB + Pusher + Vercel\n\nBy Nethindu 🐻');
        }

        document.getElementById('battleCode').addEventListener('input', e => {
            e.target.value = e.target.value.toUpperCase();
        });

        document.getElementById('playerName').addEventListener('keypress', e => {
            if (e.key === 'Enter') enterLobby();
        });
    </script>
</body>
</html>

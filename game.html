<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exile Clash - Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            background: url('img/bg/darkd.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Poppins', sans-serif; color: #fff; transition: background-image 0.3s ease;
        }
        body.light { background-image: url('img/bg/lightd.png'); color: #000; }
        @media (max-width: 1024px) {
            body { background-image: url('img/bg/darkp.png'); }
            body.light { background-image: url('img/bg/lightp.png'); }
        }
        .glass {
            background: rgba(0, 0, 0, 0.25); border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); backdrop-filter: blur(3.7px);
            -webkit-backdrop-filter: blur(3.7px); border: 1px solid rgba(255, 255, 255, 0.08);
        }
        body.light .glass { background: rgba(255, 255, 255, 0.17); border: 1px solid rgba(255, 255, 255, 0.09); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .top-bar { position: fixed; top: 20px; left: 20px; right: 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 100; }
        .logo { font-size: clamp(16px, 3vw, 20px); font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        body.light .logo { text-shadow: 0 2px 4px rgba(255,255,255,0.3); }
        .theme-btn { padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: clamp(12px, 2.5vw, 14px); border: none; font-family: 'Poppins', sans-serif; font-weight: 700; }
        .page-wrapper { position: fixed; top: 100px; left: 20px; right: 20px; bottom: 20px; padding: clamp(20px, 4vw, 40px); display: flex; justify-content: center; align-items: center; overflow-y: auto; }
        .battle-container { width: 100%; max-width: 800px; padding: 30px; }
        .code-display { font-size: clamp(20px, 4vw, 28px); font-weight: 900; letter-spacing: 3px; text-align: center; margin-bottom: 20px; }
        .players-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .player-badge { padding: 10px 15px; border-radius: 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .game-title { font-size: clamp(24px, 5vw, 32px); font-weight: 900; text-align: center; margin-bottom: 10px; }
        .score { font-size: clamp(36px, 8vw, 60px); font-weight: 900; text-align: center; margin: 20px 0; }
        .choices { display: flex; gap: 20px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .choice-btn {
            width: clamp(90px, 20vw, 120px); height: clamp(90px, 20vw, 120px); border-radius: 16px; cursor: pointer;
            font-size: clamp(40px, 10vw, 50px); border: none; transition: all 0.3s; color: #fff;
        }
        body.light .choice-btn { color: #000; }
        .choice-btn:hover { transform: scale(1.1); }
        .choice-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .choice-btn.selected { box-shadow: 0 0 30px rgba(76, 175, 80, 0.8); }
        .result { font-size: clamp(24px, 6vw, 36px); font-weight: 900; text-align: center; margin: 20px 0; min-height: 50px; }
        .vs { font-size: clamp(18px, 4vw, 24px); text-align: center; margin: 20px 0; opacity: 0.7; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; border-radius: 12px; font-family: 'Poppins', sans-serif; }
        .btn-danger { background: rgba(244, 67, 54, 0.4); }
        .waiting { text-align: center; font-size: 18px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="top-bar glass">
        <div class="logo"><i class="fa-solid fa-khanda"></i> Exile Clash</div>
        <button class="theme-btn glass" onclick="toggleTheme()"><i class="fa-solid fa-sun"></i></button>
    </div>
    <div class="page-wrapper glass">
        <div class="battle-container">
            <div class="code-display">BATTLE: <span id="codeDisplay">------</span></div>
            <div class="players-bar" id="playersBar"></div>
            <div class="game-title">CLASH ARENA</div>
            <div class="score"><span id="myScore">0</span> - <span id="opponentScore">0</span></div>
            <div class="waiting" id="waitingMsg">Waiting for opponent...</div>
            <div id="gameContent" style="display:none;">
                <div style="text-align:center;opacity:0.7;margin-bottom:20px;">Choose Your Weapon</div>
                <div class="choices">
                    <button class="choice-btn glass" onclick="makeChoice('rock')">✊</button>
                    <button class="choice-btn glass" onclick="makeChoice('paper')">✋</button>
                    <button class="choice-btn glass" onclick="makeChoice('scissors')">✌️</button>
                </div>
                <div class="vs" id="vsDisplay"></div>
                <div class="result" id="resultDisplay"></div>
            </div>
            <div style="text-align:center;margin-top:30px;">
                <button class="btn btn-danger glass" onclick="leaveGame()"><i class="fa-solid fa-door-open"></i> Retreat</button>
            </div>
        </div>
    </div>
    <script>
        const PUSHER_KEY = '52d629612765e85a5546';
        const PUSHER_CLUSTER = 'ap2';
        const urlParams = new URLSearchParams(window.location.search);
        const gameCode = urlParams.get('code');
        const playerName = urlParams.get('name');
        const userId = Math.random().toString(36).substring(7);

        let pusher, gameChannel, myChoice = null, opponentChoice = null;
        let myScore = 0, opponentScore = 0;

        document.getElementById('codeDisplay').textContent = gameCode;

        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.querySelector('.theme-btn');
            if (document.body.classList.contains('light')) {
                btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            document.querySelector('.theme-btn').innerHTML = '<i class="fa-solid fa-moon"></i>';
        }

        function initGame() {
            pusher = new Pusher(PUSHER_KEY, {
                cluster: PUSHER_CLUSTER,
                authEndpoint: '/api/pusher/auth',
                auth: { params: { user_info: JSON.stringify({ user_id: userId, username: playerName }) } }
            });
            gameChannel = pusher.subscribe(`presence-game-${gameCode}`);
            gameChannel.bind('pusher:subscription_succeeded', (members) => {
                updatePlayers(members);
                if (members.count === 2) startRound();
            });
            gameChannel.bind('pusher:member_added', (member) => {
                updatePlayers(gameChannel.members);
                if (gameChannel.members.count === 2) startRound();
            });
            gameChannel.bind('pusher:member_removed', () => {
                updatePlayers(gameChannel.members);
                document.getElementById('waitingMsg').style.display = 'block';
                document.getElementById('gameContent').style.display = 'none';
            });
            gameChannel.bind('client-choice', (data) => {
                if (data.userId!== userId) {
                    opponentChoice = data.choice;
                    checkResult();
                }
            });
            gameChannel.bind('client-reset', () => resetRound());
        }

        function updatePlayers(members) {
            const players = [];
            members.each(m => players.push({ name: m.info.username, isMe: m.id === members.me.id }));
            document.getElementById('playersBar').innerHTML = players.map(p => `
                <div class="player-badge glass"><i class="fa-solid fa-user"></i> ${p.name}${p.isMe ? ' (You)' : ''}</div>
            `).join('');
        }

        function startRound() {
            document.getElementById('waitingMsg').style.display = 'none';
            document.getElementById('gameContent').style.display = 'block';
            resetRound();
        }

        function makeChoice(choice) {
            if (myChoice) return;
            myChoice = choice;
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.textContent.includes(getEmoji(choice))) btn.classList.add('selected');
            });
            gameChannel.trigger('client-choice', { userId, choice });
            checkResult();
        }

        function checkResult() {
            if (!myChoice ||!opponentChoice) return;
            const vs = `${getEmoji(myChoice)} VS ${getEmoji(opponentChoice)}`;
            document.getElementById('vsDisplay').textContent = vs;
            let result = '';
            if (myChoice === opponentChoice) result = "DRAW!";
            else if (
                (myChoice === 'rock' && opponentChoice === 'scissors') ||
                (myChoice === 'paper' && opponentChoice === 'rock') ||
                (myChoice === 'scissors' && opponentChoice === 'paper')
            ) {
                result = "VICTORY!"; myScore++;
            } else {
                result = "DEFEAT!"; opponentScore++;
            }
            document.getElementById('resultDisplay').textContent = result;
            document.getElementById('myScore').textContent = myScore;
            document.getElementById('opponentScore').textContent = opponentScore;
            setTimeout(() => gameChannel.trigger('client-reset', {}), 3000);
        }

        function resetRound() {
            myChoice = null; opponentChoice = null;
            document.getElementById('vsDisplay').textContent = '';
            document.getElementById('resultDisplay').textContent = '';
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = false; btn.classList.remove('selected');
            });
        }

        function getEmoji(choice) {
            return choice === 'rock' ? '✊' : choice === 'paper' ? '✋' : '✌️';
        }

        function leaveGame() {
            if (confirm('Retreat from battle?')) window.location.href = '/';
        }

        initGame();
    </script>
</body>
</html>

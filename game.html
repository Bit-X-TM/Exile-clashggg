<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exile Clash - Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        :root {
            --accent: #7c5cfc;
            --accent2: #00e5ff;
            --green: #4CAF50;
            --red: #f5576c;
            --gold: #ffd700;
            --top-h: 62px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: url('img/bg/darkd.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            touch-action: manipulation;
        }
        body.light { background-image: url('img/bg/lightd.png'); color: #111; }
        @media (max-width: 1024px) {
            body { background-image: url('img/bg/darkp.png'); }
            body.light { background-image: url('img/bg/lightp.png'); }
        }

        /* ── GLASS ── */
        .glass {
            background: rgba(0,0,0,0.30);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10);
        }
        body.light .glass {
            background: rgba(255,255,255,0.30);
            border-color: rgba(255,255,255,0.50);
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: fixed; top: 12px; left: 12px; right: 12px;
            height: var(--top-h);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 200; border-radius: 18px; gap: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        .logo-area { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
        .lobby-name {
            font-size: clamp(13px, 2.5vw, 19px); font-weight: 900;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        body.light .lobby-name { text-shadow: none; color: #111; }
        .lobby-code-bar {
            font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
            color: var(--accent2);
        }
        body.light .lobby-code-bar { color: var(--accent); }

        .top-center { flex: 1; display: flex; justify-content: center; }
        .phase-badge {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 6px 18px; border-radius: 20px;
            font-size: clamp(11px, 2vw, 14px); font-weight: 800; letter-spacing: 0.5px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .phase-badge.rps  { background: rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.4); color: var(--accent2); }
        .phase-badge.shop { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); color: var(--gold); }
        .phase-badge.over { background: rgba(245,87,108,0.12); border-color: rgba(245,87,108,0.4); color: var(--red); }
        body.light .phase-badge      { background: rgba(0,0,0,0.07); border-color: rgba(0,0,0,0.14); color: #555; }
        body.light .phase-badge.rps  { color: #007a99; background: rgba(0,180,220,0.1); }
        body.light .phase-badge.shop { color: #886600; background: rgba(180,140,0,0.1); }

        .top-right { display: flex; align-items: center; gap: 8px; }
        .theme-btn {
            color: #fff; padding: 6px 13px; border-radius: 10px; cursor: pointer;
            font-size: 12px; font-weight: 700; font-family: 'Poppins', sans-serif;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.10);
            transition: all 0.2s; white-space: nowrap;
        }
        body.light .theme-btn { color: #111; background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.12); }
        .theme-btn:hover { background: rgba(255,255,255,0.18); }

        /* ── FULL-SCREEN LAYOUT ── */
        .game-layout {
            position: fixed;
            top: calc(var(--top-h) + 22px);
            left: 10px; right: 10px; bottom: 10px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 10px;
        }
        @media (max-width: 860px) {
            .game-layout {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }
        }

        /* ── PLAYERS PANEL ── */
        .players-panel {
            border-radius: 20px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px 10px;
            font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
            text-transform: uppercase; opacity: 0.5;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        body.light .panel-header { border-color: rgba(0,0,0,0.08); opacity: 0.4; color: #111; }
        .players-scroll {
            flex: 1; overflow-y: auto; padding: 14px;
            -webkit-overflow-scrolling: touch;
        }
        .players-scroll::-webkit-scrollbar { width: 3px; }
        .players-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        /* ── PLAYER CARD ── */
        .player-card {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.10);
            border-radius: 18px; padding: 14px 10px 12px;
            text-align: center; position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 7px;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
        }
        .player-card:not(.dead):hover { transform: translateY(-2px); }
        .player-card.you {
            border-color: var(--accent2);
            box-shadow: 0 0 22px rgba(0,229,255,0.22);
            background: rgba(0,229,255,0.05);
        }
        .player-card.dead { opacity: 0.22; filter: grayscale(1); pointer-events: none; }
        .player-card.bot  { border-color: #ff9800; }

        body.light .player-card { background: rgba(255,255,255,0.35); border-color: rgba(0,0,0,0.10); color: #111; }
        body.light .player-card.you { background: rgba(0,180,220,0.10); border-color: #0099bb; }

        .rps-result {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            padding: 2px 10px; border-radius: 20px;
            font-size: 10px; font-weight: 800; white-space: nowrap; z-index: 2;
        }
        .result-win  { background: rgba(76,175,80,0.95); color: #fff; }
        .result-lose { background: rgba(245,87,108,0.95); color: #fff; }
        .result-draw { background: rgba(255,152,0,0.95); color: #fff; }

        .shields-row {
            position: absolute; top: 8px; right: 8px;
            display: flex; gap: 2px; flex-wrap: wrap; max-width: 46px;
        }
        .shield-dot {
            width: 9px; height: 9px; background: var(--accent2);
            border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 5px rgba(0,229,255,0.4);
        }

        .island-wrap { width: 68px; height: 68px; position: relative; flex-shrink: 0; }
        .island-img {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            position: relative;
        }
        .island-damage {
            position: absolute; inset: 0;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            pointer-events: none; opacity: 0;
        }
        .damage-1 .island-damage { clip-path: polygon(0 25%,100% 25%,100% 100%,0 100%); opacity: 1; }
        .damage-2 .island-damage { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); opacity: 1; }
        .damage-3 .island-damage { clip-path: polygon(0 75%,100% 75%,100% 100%,0 100%); opacity: 1; }
        .damage-4 .island-img    { filter: grayscale(1) brightness(0.35); }

        .p-name {
            font-size: clamp(10px, 1.6vw, 13px); font-weight: 700;
            word-break: break-word; line-height: 1.2; width: 100%;
        }
        .you-tag {
            display: inline-block; font-size: 8px; font-weight: 900; letter-spacing: 1px;
            padding: 1px 6px; border-radius: 4px;
            background: var(--accent2); color: #000; vertical-align: middle; margin-left: 3px;
        }
        .p-stats {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;
            font-size: clamp(9px, 1.5vw, 11px); width: 100%; font-weight: 600;
        }
        .p-stat { display: inline-flex; align-items: center; gap: 2px; }
        .heart-ic { color: var(--red); font-size: 9px; }
        .coin-ic  { color: var(--gold); font-size: 9px; }

        /* ── ACTION PANEL ── */
        .action-panel {
            border-radius: 20px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .action-scroll {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .action-scroll::-webkit-scrollbar { width: 3px; }
        .action-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        /* ── WAITING ── */
        .waiting-box {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            padding: 32px 16px; text-align: center; min-height: 120px;
        }
        .waiting-icon { font-size: 44px; opacity: 0.4; }
        .waiting-txt  { font-size: 14px; font-weight: 700; opacity: 0.7; line-height: 1.5; }
        .dots::after { content: '.'; animation: dotanim 1.4s infinite; }
        @keyframes dotanim { 0%,25%{content:'.'} 26%,50%{content:'..'} 51%,100%{content:'...'} }

        /* ── RPS ── */
        .section-lbl {
            font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
            text-transform: uppercase; opacity: 0.5; margin-bottom: 8px;
        }
        body.light .section-lbl { color: #111; }

        .rps-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .rps-btn {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.14);
            border-radius: 16px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 5px; font-size: 1.8rem; color: inherit;
            font-family: 'Poppins', sans-serif;
            transition: all 0.15s; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .rps-btn:not(:disabled):active { transform: scale(0.92); background: rgba(255,255,255,0.16); }
        @media (hover:hover) {
            .rps-btn:not(:disabled):hover {
                background: rgba(0,229,255,0.12); border-color: var(--accent2); transform: scale(1.04);
            }
        }
        .rps-btn.selected {
            background: linear-gradient(135deg, rgba(0,229,255,0.25), rgba(124,92,252,0.25));
            border-color: var(--accent2); box-shadow: 0 0 16px rgba(0,229,255,0.25);
        }
        .rps-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .rps-lbl { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }
        body.light .rps-btn { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.14); color: #222; }

        .waiting-result {
            text-align: center; color: var(--accent2); font-weight: 700; font-size: 13px;
            padding: 10px 0 4px;
        }
        body.light .waiting-result { color: var(--accent); }

        /* ── SHOP ── */
        .coin-bar {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 9px 14px; border-radius: 12px;
            background: rgba(255,215,0,0.10); border: 1px solid rgba(255,215,0,0.28);
            font-size: 17px; font-weight: 900; color: var(--gold);
        }
        body.light .coin-bar { background: rgba(200,160,0,0.10); border-color: rgba(180,130,0,0.25); color: #886600; }

        .shop-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
        .shop-btn {
            background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 10px 5px;
            text-align: center; cursor: pointer; color: inherit;
            font-family: 'Poppins', sans-serif; width: 100%;
            transition: all 0.15s; touch-action: manipulation;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .shop-btn:not(:disabled):active { transform: scale(0.95); }
        @media (hover:hover) {
            .shop-btn:not(:disabled):hover {
                background: rgba(0,229,255,0.10); border-color: var(--accent2); transform: translateY(-2px);
            }
        }
        .shop-btn:disabled { opacity: 0.28; cursor: not-allowed; }
        body.light .shop-btn { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.11); color: #222; }
        .s-icon  { font-size: 1.5rem; line-height: 1.1; }
        .s-name  { font-size: 10px; font-weight: 800; }
        .s-desc  { font-size: 8px; opacity: 0.6; line-height: 1.3; }
        .s-cost  { font-size: 11px; font-weight: 900; color: var(--gold); }
        .s-owned { font-size: 8px; opacity: 0.5; }
        body.light .s-desc { color: #444; opacity: 0.65; }

        /* ── INVENTORY ── */
        .inv-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .inv-btn {
            display: inline-flex; align-items: center; gap: 7px;
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.14);
            border-radius: 12px; padding: 9px 14px; cursor: pointer;
            color: inherit; font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: 13px; transition: all 0.15s; touch-action: manipulation; min-height: 44px;
        }
        .inv-btn.active { background: rgba(245,87,108,0.18); border-color: var(--red); }
        .inv-btn:active { transform: scale(0.95); }
        body.light .inv-btn { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); color: #222; }
        .inv-count {
            background: var(--red); color: #fff; border-radius: 50%;
            width: 20px; height: 20px; display: inline-flex; align-items: center;
            justify-content: center; font-size: 10px; font-weight: 800;
        }

        /* ── TARGET ── */
        .target-panel {
            display: none; padding: 12px; border-radius: 14px;
            background: rgba(245,87,108,0.08); border: 2px solid rgba(245,87,108,0.32);
        }
        .target-panel.active { display: block; animation: fadeUp 0.2s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
        .target-label {
            text-align: center; color: var(--red); font-weight: 800; font-size: 12px;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .target-btns { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
        .target-btn {
            background: rgba(245,87,108,0.14); border: 2px solid rgba(245,87,108,0.38);
            border-radius: 11px; padding: 9px 14px; cursor: pointer;
            color: #fff; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 12px;
            display: inline-flex; align-items: center; gap: 7px;
            transition: all 0.15s; touch-action: manipulation; min-height: 42px;
        }
        .target-btn:active { background: rgba(245,87,108,0.38); transform: scale(0.95); }
        body.light .target-btn { color: #222; }
        .cancel-btn {
            display: block; margin: 10px auto 0;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
            border-radius: 10px; padding: 7px 20px; cursor: pointer; color: inherit;
            font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 11px;
        }
        body.light .cancel-btn { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); color: #333; }

        /* ── DIVIDER ── */
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 2px 0; flex-shrink: 0; }
        body.light .divider { background: rgba(0,0,0,0.08); }

        /* ── HOST CONTROLS ── */
        .host-bar { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn {
            flex: 1; min-height: 46px; border-radius: 12px; border: none; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 14px; color: #fff;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.18s; touch-action: manipulation;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn.primary { background: linear-gradient(135deg, #3a7d44, #4CAF50); }
        .action-btn.cyan    { background: linear-gradient(135deg, var(--accent2), #2196f3); }
        .action-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ── MODAL ── */
        .modal {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.82); backdrop-filter: blur(14px);
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; animation: fadeUp 0.3s ease; }
        .modal-box {
            background: rgba(8,8,18,0.97); border: 1px solid rgba(255,255,255,0.11);
            border-radius: 28px; padding: 40px 32px;
            text-align: center; max-width: 360px; width: 100%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
        }
        body.light .modal-box { background: rgba(245,245,255,0.98); border-color: rgba(0,0,0,0.10); }
        .modal-icon  { font-size: 52px; margin-bottom: 10px; }
        .modal-title { font-size: clamp(20px,4vw,26px); font-weight: 900; margin-bottom: 6px; }
        .winner-txt  {
            font-size: clamp(22px,5vw,34px); font-weight: 900; margin: 16px 0 8px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .modal-sub { opacity: 0.55; font-size: 13px; margin-bottom: 22px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
            background: rgba(8,8,18,0.97); color: #fff; padding: 11px 22px;
            border-radius: 12px; font-weight: 700; z-index: 2000;
            animation: slideUp 0.3s ease; max-width: 90vw; text-align: center;
            border: 1px solid rgba(255,255,255,0.09); font-size: 13px; pointer-events: none;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translate(-50%,14px); }
            to   { opacity:1; transform:translate(-50%,0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar glass">
        <div class="logo-area">
            <div class="lobby-name" id="lobby-name">Exile Clash</div>
            <div class="lobby-code-bar">CODE: <span id="lobby-code">------</span></div>
        </div>
        <div class="top-center">
            <div class="phase-badge" id="phase-badge">
                <i class="fa-solid fa-hourglass-half"></i> Waiting
            </div>
        </div>
        <div class="top-right">
            <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
                <i class="fa-solid fa-sun"></i> Theme
            </button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="game-layout">

        <!-- LEFT: Players grid -->
        <div class="players-panel glass">
            <div class="panel-header">⚔ Warriors</div>
            <div class="players-scroll">
                <div class="players-grid" id="players-grid"></div>
            </div>
        </div>

        <!-- RIGHT: Actions -->
        <div class="action-panel glass">
            <div class="panel-header">🎮 Actions</div>
            <div class="action-scroll" id="action-scroll">

                <!-- Waiting State -->
                <div class="waiting-box" id="waiting-box">
                    <div class="waiting-icon">⚔️</div>
                    <div class="waiting-txt" id="waiting-txt">
                        Waiting for host to start<span class="dots"></span>
                    </div>
                </div>

                <!-- RPS Phase -->
                <div id="rps-phase" class="hidden">
                    <div class="section-lbl">⚡ Choose your move</div>
                    <div class="rps-grid">
                        <button class="rps-btn" id="btn-rock" onclick="chooseRPS('rock')">
                            <div>🪨</div><div class="rps-lbl">Rock</div>
                        </button>
                        <button class="rps-btn" id="btn-paper" onclick="chooseRPS('paper')">
                            <div>📄</div><div class="rps-lbl">Paper</div>
                        </button>
                        <button class="rps-btn" id="btn-scissors" onclick="chooseRPS('scissors')">
                            <div>✂️</div><div class="rps-lbl">Scissors</div>
                        </button>
                    </div>
                    <div class="waiting-result hidden" id="rps-waiting">
                        Waiting for others<span class="dots"></span>
                    </div>
                </div>

                <!-- Shop Phase -->
                <div id="coin-phase" class="hidden">
                    <div class="section-lbl">💰 Balance</div>
                    <div class="coin-bar">
                        <i class="fa-solid fa-coins"></i>
                        <span id="my-coins">0</span> coins
                    </div>

                    <div class="section-lbl" style="margin-top:12px;">🛒 Shop</div>
                    <div class="shop-grid" id="shop"></div>

                    <div class="divider" style="margin-top:12px;"></div>

                    <div class="section-lbl" style="margin-top:10px;">🎒 Inventory</div>
                    <div class="inv-row" id="inventory"></div>

                    <div class="target-panel" id="target-panel" style="margin-top:10px;">
                        <div class="target-label">
                            <i class="fa-solid fa-crosshairs"></i>
                            <span id="target-panel-label">Pick a target</span>
                        </div>
                        <div class="target-btns" id="target-buttons"></div>
                        <button class="cancel-btn" onclick="cancelTarget()">✕ Cancel</button>
                    </div>
                </div>

                <!-- Spacer to push host controls down -->
                <div style="flex:1;"></div>

                <!-- Host controls -->
                <div id="host-controls" class="hidden">
                    <div class="divider"></div>
                    <div class="host-bar" style="margin-top:10px;">
                        <button class="action-btn primary" id="start-btn" onclick="startGame()">
                            <i class="fa-solid fa-play"></i> Start
                        </button>
                        <button class="action-btn cyan hidden" id="next-round-btn" onclick="nextRound()">
                            <i class="fa-solid fa-forward"></i> Next Round
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- GAME OVER MODAL -->
    <div class="modal" id="game-over-modal">
        <div class="modal-box">
            <div class="modal-icon">🏆</div>
            <div class="modal-title">Game Over</div>
            <div class="winner-txt" id="winner-name">Player</div>
            <div class="modal-sub">Winner Winner Chicken Dinner!</div>
            <button class="action-btn cyan" style="width:100%;flex:none;" onclick="location.href='/'">
                <i class="fa-solid fa-house"></i> Back to Lobby
            </button>
        </div>
    </div>

    <script>
        const API        = '/api/game';
        const urlParams  = new URLSearchParams(window.location.search);
        const lobbyId    = urlParams.get('code');
        const userId     = localStorage.getItem('exile_uid');
        const playerName = localStorage.getItem('exile_player_name') || 'Guest';

        let gameState     = null;
        let pusher        = null;
        let channel       = null;
        let targetMode    = null;
        let gameOverShown = false;
        let rpsChosen     = false;

        if (!lobbyId || !userId) {
            alert('Invalid game session. Returning to lobby.');
            location.href = '/';
        }

        document.getElementById('lobby-code').textContent = lobbyId;

        /* ── THEME ── */
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('theme-btn');
            const isLight = document.body.classList.contains('light');
            btn.innerHTML = isLight ? '<i class="fa-solid fa-moon"></i> Theme' : '<i class="fa-solid fa-sun"></i> Theme';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            document.getElementById('theme-btn').innerHTML = '<i class="fa-solid fa-moon"></i> Theme';
        }

        /* ── PUSHER ── */
        pusher = new Pusher('52d629612765e85a5546', {
            cluster: 'ap2',
            authEndpoint: '/api/pusher/auth',
            auth: { params: { user_info: JSON.stringify({ user_id: userId, username: playerName }) } }
        });

        channel = pusher.subscribe(`game-${lobbyId}`);
        channel.bind('state-update',     () => { if (!gameOverShown) loadGameState(); });
        channel.bind('game-started',     () => { if (!gameOverShown) loadGameState(); });
        channel.bind('rps-resolved',     () => { if (!gameOverShown) loadGameState(); });
        channel.bind('rps-draw', (data)  => {
            rpsChosen = false;
            showToast(data.message || 'Draw! Choose again!');
            if (!gameOverShown) loadGameState();
        });
        channel.bind('host-transferred', () => { showToast('Host transferred 👑'); if (!gameOverShown) loadGameState(); });
        channel.bind('game-ended', (data) => showGameOver(data.winner));

        /* ── API ── */
        async function apiCall(action, data = {}) {
            try {
                const res = await fetch(API, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, lobby_id: lobbyId, ...data })
                });
                return await res.json();
            } catch(e) { return { error: 'Network error' }; }
        }

        /* ── LOAD STATE ── */
        async function loadGameState() {
            if (gameOverShown) return;
            const res = await apiCall('get_state');
            if (res.error) {
                if (!gameOverShown) {
                    showToast(res.error);
                    setTimeout(() => { if (!gameOverShown) location.href = '/'; }, 2000);
                }
                return;
            }
            gameState = res.lobby;
            if (gameState.phase === 'finished' && !gameOverShown) {
                const alive = gameState.players.filter(p => !p.is_dead);
                showGameOver(alive[0] || null);
                return;
            }
            const me = gameState.players.find(p => p.uid === userId);
            if (gameState.phase === 'rps') rpsChosen = !!(me && me.rps_choice);
            renderGame();
        }

        /* ── RENDER ── */
        function renderGame() {
            if (!gameState) return;
            document.getElementById('lobby-name').textContent = gameState.name;
            renderPlayers();
            renderPhase();
            renderHostControls();
        }

        function renderPlayers() {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = gameState.players.map(p => {
                const isYou  = p.uid === userId;
                const isDead = p.is_dead;
                const isHost = p.uid === gameState.host_uid;
                const isBot  = p.uid.startsWith('bot_');
                const health = Math.max(0, p.health);
                const dmgCls = health < 4 ? `damage-${4 - health}` : '';
                const shields = Array(p.shields || 0).fill('<div class="shield-dot"></div>').join('');
                let rCls = '', rLabel = '';
                if (p.rps_result) {
                    rCls   = p.rps_result === 'WIN' ? 'result-win' : p.rps_result === 'LOSE' ? 'result-lose' : 'result-draw';
                    rLabel = p.rps_result;
                }
                return `<div class="player-card ${isYou?'you':''} ${isDead?'dead':''} ${isBot?'bot':''}">
                    ${rLabel ? `<div class="rps-result ${rCls}">${rLabel}</div>` : ''}
                    <div class="shields-row">${shields}</div>
                    <div class="island-wrap">
                        <div class="island-img ${dmgCls}" style="background-image:url('img/il/${p.island}.png')">
                            <div class="island-damage" style="background-image:url('img/il/${p.island}.png')"></div>
                        </div>
                    </div>
                    <div class="p-name">
                        ${isHost?'👑 ':''}${p.name}${isBot?' 🤖':''}
                        ${isYou ? '<span class="you-tag">YOU</span>' : ''}
                    </div>
                    <div class="p-stats">
                        <span class="p-stat"><i class="fa-solid fa-heart heart-ic"></i> ${health}</span>
                        <span class="p-stat"><i class="fa-solid fa-coins coin-ic"></i> ${p.coins}</span>
                        <span class="p-stat">💣 ${p.canon}</span>
                        <span class="p-stat">⚔️ ${p.slicer}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPhase() {
            const me       = gameState.players.find(p => p.uid === userId);
            const badge    = document.getElementById('phase-badge');
            const waitBox  = document.getElementById('waiting-box');
            const rpsPhase = document.getElementById('rps-phase');
            const coinPhase= document.getElementById('coin-phase');

            waitBox.classList.add('hidden');
            rpsPhase.classList.add('hidden');
            coinPhase.classList.add('hidden');

            badge.className = 'phase-badge';
            if (gameState.phase === 'rps') {
                badge.className += ' rps';
                badge.innerHTML = '<i class="fa-solid fa-hand-fist"></i> RPS Phase';
            } else if (gameState.phase === 'coin') {
                badge.className += ' shop';
                badge.innerHTML = '<i class="fa-solid fa-coins"></i> Shop Phase';
            } else if (gameState.phase === 'finished') {
                badge.className += ' over';
                badge.innerHTML = '<i class="fa-solid fa-flag-checkered"></i> Game Over';
            } else {
                badge.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Waiting';
            }

            if (gameState.status === 'waiting') {
                waitBox.classList.remove('hidden');
                document.getElementById('waiting-txt').innerHTML =
                    gameState.players.length < 2
                        ? 'Waiting for players<span class="dots"></span>'
                        : 'Waiting for host to start<span class="dots"></span>';
            } else if (gameState.phase === 'rps' && me && !me.is_dead) {
                rpsPhase.classList.remove('hidden');
                const chose = rpsChosen || !!me.rps_choice;
                document.getElementById('rps-waiting').classList.toggle('hidden', !chose);
                ['rock','paper','scissors'].forEach(c => {
                    const b = document.getElementById('btn-'+c);
                    b.disabled = chose;
                    b.classList.toggle('selected', me.rps_choice === c);
                });
            } else if (gameState.phase === 'coin' && me && !me.is_dead) {
                coinPhase.classList.remove('hidden');
                document.getElementById('my-coins').textContent = me.coins || 0;
                renderShop(me);
                renderInventory(me);
                renderTargetPanel(me);
            } else if (me && me.is_dead) {
                waitBox.classList.remove('hidden');
                document.getElementById('waiting-txt').innerHTML = '💀 Eliminated! Spectating...';
            } else {
                waitBox.classList.remove('hidden');
            }
        }

        function renderShop(me) {
            const items = [
                { id:'shields', icon:'🛡️', name:'Shield',  desc:'Block 1 hit',    cost:1, max:3 },
                { id:'canon',   icon:'💣', name:'Cannon',  desc:'Break a shield', cost:1, max:3 },
                { id:'slicer',  icon:'⚔️', name:'Slicer',  desc:'Deal 1 damage',  cost:1, max:3 }
            ];
            document.getElementById('shop').innerHTML = items.map(item => {
                const owned  = me[item.id] || 0;
                const canBuy = me.coins >= item.cost && owned < item.max;
                return `<button class="shop-btn" onclick="buyItem('${item.id}')" ${!canBuy?'disabled':''}>
                    <div class="s-icon">${item.icon}</div>
                    <div class="s-name">${item.name}</div>
                    <div class="s-desc">${item.desc}</div>
                    <div class="s-cost"><i class="fa-solid fa-coins"></i> ${item.cost}</div>
                    <div class="s-owned">${owned}/${item.max}</div>
                </button>`;
            }).join('');
        }

        function renderInventory(me) {
            const inv   = document.getElementById('inventory');
            const items = [];
            if (me.canon  > 0) items.push({ id:'canon',  icon:'💣', name:'Cannon', count: me.canon  });
            if (me.slicer > 0) items.push({ id:'slicer', icon:'⚔️', name:'Slicer', count: me.slicer });
            if (!items.length) {
                inv.innerHTML = '<div style="opacity:0.45;font-size:12px;width:100%;font-weight:600;">No weapons yet</div>';
                return;
            }
            inv.innerHTML = items.map(item => `
                <button class="inv-btn ${targetMode===item.id?'active':''}" onclick="selectTarget('${item.id}')">
                    ${item.icon} ${item.name}
                    <span class="inv-count">${item.count}</span>
                </button>`).join('');
        }

        function renderTargetPanel(me) {
            const panel = document.getElementById('target-panel');
            if (!targetMode) { panel.classList.remove('active'); return; }
            const label = targetMode === 'canon' ? '💣 Cannon' : '⚔️ Slicer';
            document.getElementById('target-panel-label').textContent = `Use ${label} on…`;
            const enemies = gameState.players.filter(p => !p.is_dead && p.uid !== userId);
            document.getElementById('target-buttons').innerHTML = enemies.length
                ? enemies.map(p => {
                    const sh = p.shields > 0 ? ` 🛡️×${p.shields}` : '';
                    return `<button class="target-btn" onclick="useItemOn('${p.uid}')">
                        <span>${p.name}${sh}</span>
                        <span style="opacity:0.6;font-size:11px;">❤️${Math.max(0,p.health)}</span>
                    </button>`;
                }).join('')
                : '<div style="opacity:0.45;text-align:center;font-size:12px;">No valid targets</div>';
            panel.classList.add('active');
        }

        function renderHostControls() {
            const isHost       = gameState && gameState.host_uid === userId;
            const hc           = document.getElementById('host-controls');
            const startBtn     = document.getElementById('start-btn');
            const nextRoundBtn = document.getElementById('next-round-btn');

            if (!isHost) { hc.classList.add('hidden'); return; }
            hc.classList.remove('hidden');

            const inWaiting = gameState.status === 'waiting';
            const inCoin    = gameState.phase === 'coin';
            startBtn.classList.toggle('hidden', !inWaiting);
            nextRoundBtn.classList.toggle('hidden', !inCoin);
            if (inWaiting) startBtn.disabled = gameState.players.length < 2;
        }

        /* ── ACTIONS ── */
        async function startGame()   { const r = await apiCall('start_game'); if (r.error) showToast(r.error); }
        async function nextRound()   { await apiCall('next_round'); }
        async function buyItem(item) { const r = await apiCall('buy_item', { uid: userId, item }); if (r.error) showToast(r.error); }

        async function chooseRPS(choice) {
            if (rpsChosen) return;
            rpsChosen = true;
            ['rock','paper','scissors'].forEach(c => {
                const b = document.getElementById('btn-'+c);
                b.disabled = true;
                b.classList.toggle('selected', c === choice);
            });
            document.getElementById('rps-waiting').classList.remove('hidden');
            const res = await apiCall('rps_choice', { uid: userId, choice });
            if (res.error) {
                showToast(res.error);
                rpsChosen = false;
                ['rock','paper','scissors'].forEach(c => {
                    document.getElementById('btn-'+c).disabled = false;
                    document.getElementById('btn-'+c).classList.remove('selected');
                });
                document.getElementById('rps-waiting').classList.add('hidden');
            }
        }

        function selectTarget(item) {
            targetMode = item;
            const me = gameState && gameState.players.find(p => p.uid === userId);
            if (me) { renderInventory(me); renderTargetPanel(me); }
        }

        function cancelTarget() {
            targetMode = null;
            document.getElementById('target-panel').classList.remove('active');
            const me = gameState && gameState.players.find(p => p.uid === userId);
            if (me) renderInventory(me);
        }

        async function useItemOn(targetUid) {
            if (!targetMode) return;
            const item = targetMode;
            targetMode = null;
            document.getElementById('target-panel').classList.remove('active');
            const res = await apiCall('use_item', { uid: userId, item, target_uid: targetUid });
            if (res.error) showToast(res.error);
        }

        /* ── HELPERS ── */
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function showGameOver(winner) {
            gameOverShown = true;
            localStorage.removeItem('exile_last_lobby');
            document.getElementById('winner-name').textContent = winner ? winner.name : 'No Winner';
            document.getElementById('game-over-modal').classList.add('active');
        }

        /* ── INIT ── */
        loadGameState();
        setInterval(() => { if (!gameOverShown) loadGameState(); }, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exile Clash - Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: url('img/bg/darkd.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            transition: background-image 0.3s ease;
            color: #fff;
            touch-action: manipulation;
        }
        body.light { background-image: url('img/bg/lightd.png'); color: #000; }
        @media (max-width: 1024px) {
            body { background-image: url('img/bg/darkp.png'); }
            body.light { background-image: url('img/bg/lightp.png'); }
        }

        .glass {
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(3.7px);
            -webkit-backdrop-filter: blur(3.7px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        body.light .glass {
            background: rgba(255,255,255,0.17);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .top-bar {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 100; gap: 12px;
        }
        @media (max-width: 600px) {
            .top-bar { top: 10px; left: 10px; right: 10px; height: auto; padding: 10px 16px; flex-wrap: wrap; gap: 6px; }
        }

        .lobby-info { display: flex; flex-direction: column; gap: 4px; }
        .lobby-name { font-size: clamp(16px,3vw,22px); font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        body.light .lobby-name { text-shadow: 0 2px 4px rgba(255,255,255,0.3); }
        .lobby-code { font-size: clamp(11px,2vw,14px); opacity: 0.7; }

        .phase-info { text-align: right; }
        .phase-name { font-size: clamp(13px,2.5vw,18px); font-weight: 700; color: #4fc3f7; text-shadow: 0 2px 8px rgba(79,195,247,0.5); }

        .theme-btn {
            color: #fff; padding: 8px 14px; border-radius: 12px; cursor: pointer;
            font-size: clamp(11px,2vw,14px); border: none; font-family: 'Poppins', sans-serif;
            font-weight: 700; white-space: nowrap; touch-action: manipulation;
            transition: background 0.2s;
        }
        body.light .theme-btn { color: #000; }

        .game-area {
            position: fixed; top: 110px; left: 20px; right: 20px; bottom: 20px;
            padding: clamp(12px,3vw,25px); overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 480px) { .game-area { top: 90px; left: 10px; right: 10px; bottom: 10px; } }

        .players-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
            gap: clamp(10px,2vw,20px); margin-bottom: 20px;
        }
        @media (max-width: 768px) { .players-grid { grid-template-columns: repeat(2,1fr); gap: 10px; } }
        @media (max-width: 400px) { .players-grid { grid-template-columns: repeat(2,1fr); gap: 8px; } }

        .player-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 12px; text-align: center; position: relative;
            min-height: 210px; display: flex; flex-direction: column;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, opacity 0.4s ease, filter 0.4s ease;
        }
        @media (max-width: 400px) { .player-card { min-height: 185px; padding: 10px; } }
        .player-card.you   { border-color: #4fc3f7; box-shadow: 0 0 25px rgba(79,195,247,0.4); animation: pulse-you 2s infinite; }
        .player-card.dead  { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .player-card.bot   { border-color: #ff9800; box-shadow: 0 0 20px rgba(255,152,0,0.3); }
        @keyframes pulse-you {
            0%, 100% { box-shadow: 0 0 25px rgba(79,195,247,0.4); }
            50% { box-shadow: 0 0 35px rgba(79,195,247,0.6); }
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(245,87,108,0.4); }
            50%      { box-shadow: 0 0 25px rgba(245,87,108,0.7); }
        }

        .island-wrapper { width: 80px; height: 80px; margin: 0 auto 8px; position: relative; flex-shrink: 0; }
        @media (max-width: 400px) { .island-wrapper { width: 65px; height: 65px; } }

        .island-img {
            display: block; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            position: relative;
        }
        .island-damage {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
        }
        .damage-1 .island-damage { clip-path: polygon(0 25%,100% 25%,100% 100%,0 100%); opacity: 1; }
        .damage-2 .island-damage { clip-path: polygon(0 50%,100% 50%,100% 100%,0 100%); opacity: 1; }
        .damage-3 .island-damage { clip-path: polygon(0 75%,100% 75%,100% 100%,0 100%); opacity: 1; }
        .damage-4 .island-img   { filter: grayscale(1) brightness(0.5); }

        .player-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
        .player-name { font-weight: 700; font-size: clamp(11px,2vw,14px); word-break: break-word; }
        .player-stats {
            display: flex; justify-content: center; gap: 6px;
            font-size: clamp(10px,1.8vw,13px); opacity: 0.9; flex-wrap: wrap;
        }
        .stat { display: flex; align-items: center; gap: 3px; }

        .shields { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; flex-wrap: wrap; max-width: 60px; }
        .shield-icon {
            width: 12px; height: 12px; background: #4fc3f7; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 2px 6px rgba(79,195,247,0.5);
        }

        .rps-result {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 3px 10px; border-radius: 8px;
            font-size: clamp(10px,1.8vw,12px); font-weight: 700; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2); z-index: 2;
        }
        .result-win  { color: #4caf50; }
        .result-lose { color: #f5576c; }
        .result-draw { color: #ff9800; }

        .game-panel {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: clamp(16px,4vw,30px); margin-bottom: 20px;
        }
        .phase-title {
            text-align: center; font-size: clamp(16px,3.5vw,22px); font-weight: 900;
            margin-bottom: 16px; color: #4fc3f7; text-shadow: 0 2px 8px rgba(79,195,247,0.5);
        }

        /* RPS */
        .rps-choices { display: flex; justify-content: center; gap: clamp(10px,3vw,25px); flex-wrap: wrap; }
        .rps-btn {
            width: clamp(90px,22vw,130px); height: clamp(90px,22vw,130px);
            background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.2);
            border-radius: 20px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; font-size: clamp(2rem,6vw,3rem); color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            touch-action: manipulation; -webkit-user-select: none; user-select: none;
            min-height: 120px;
        }
        @media (hover: hover) {
            .rps-btn:not(:disabled):hover { background: rgba(255,255,255,0.15); border-color: #4fc3f7; transform: scale(1.05); }
        }
        .rps-btn:not(:disabled):active { background: rgba(255,255,255,0.2); border-color: #4fc3f7; transform: scale(0.96); }
        .rps-btn.selected { background: linear-gradient(135deg,#4fc3f7,#2196f3); border-color: transparent; }
        .rps-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .rps-label { font-size: clamp(11px,2vw,14px); font-weight: 700; }

        .waiting-result {
            text-align: center; padding: 16px 0 0; color: #4fc3f7;
            font-weight: 700; font-size: clamp(13px,2.5vw,16px); opacity: 0.85;
        }
        .dots { display: inline-block; width: 24px; text-align: left; }
        .dots::after { content: '.'; animation: dotanim 1.2s infinite; }
        @keyframes dotanim { 0%,25%{content:'.'} 26%,50%{content:'..'} 51%,100%{content:'...'} }

        /* Toast Notifications */
        .toast-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
            max-width: 350px;
        }
        @media (max-width: 600px) { .toast-container { bottom: 10px; right: 10px; left: 10px; max-width: none; } }

        .toast {
            background: rgba(0,0,0,0.9); border-radius: 12px;
            padding: 14px 18px; border-left: 4px solid;
            display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 4.7s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
        @media (max-width: 600px) {
            @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes slideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100px); opacity: 0; } }
        }

        .toast-icon { font-size: 18px; flex-shrink: 0; }
        .toast-content { flex: 1; font-size: 14px; font-weight: 600; }
        .toast-kill { border-left-color: #f5576c; }
        .toast-kill .toast-icon { color: #f5576c; }
        .toast-round-win { border-left-color: #4caf50; }
        .toast-round-win .toast-icon { color: #4caf50; }
        .toast-round-lose { border-left-color: #ff9800; }
        .toast-round-lose .toast-icon { color: #ff9800; }
        .toast-round-draw { border-left-color: #9c27b0; }
        .toast-round-draw .toast-icon { color: #9c27b0; }
        .toast-purchase { border-left-color: #ffd700; }
        .toast-purchase .toast-icon { color: #ffd700; }
        .toast-phase { border-left-color: #4fc3f7; }
        .toast-phase .toast-icon { color: #4fc3f7; }

        /* Shop */
        .shop {
            display: grid; grid-template-columns: repeat(3,1fr);
            gap: clamp(8px,2.5vw,16px); margin-bottom: 16px;
        }
        .shop-item {
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: clamp(10px,2.5vw,16px) clamp(6px,1.5vw,10px);
            text-align: center; cursor: pointer; color: inherit;
            font-family: 'Poppins', sans-serif; width: 100%;
            transition: all 0.2s ease;
            touch-action: manipulation;
            min-height: 140px;
        }
        @media (hover: hover) {
            .shop-item:not(:disabled):hover { background: rgba(255,255,255,0.15); border-color: #4fc3f7; transform: translateY(-3px); }
        }
        .shop-item:not(:disabled):active { background: rgba(255,255,255,0.2); transform: scale(0.97); }
        .shop-item:disabled { opacity: 0.35; cursor: not-allowed; }

        .item-icon  { font-size: clamp(1.5rem,4vw,2.5rem); margin-bottom: 6px; }
        .item-name  { font-weight: 700; font-size: clamp(12px,2.2vw,15px); margin-bottom: 3px; }
        .item-desc  { font-size: clamp(9px,1.5vw,12px); opacity: 0.7; margin-bottom: 6px; }
        .item-cost  { font-weight: 700; color: #ffd700; font-size: clamp(11px,2vw,14px); }
        .item-owned { font-size: clamp(9px,1.5vw,11px); opacity: 0.6; margin-top: 3px; }

        /* Inventory */
        .inventory {
            display: flex; justify-content: center; gap: clamp(8px,2vw,15px);
            flex-wrap: wrap; margin-top: 14px;
        }
        .inv-item {
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px; padding: clamp(10px,2vw,14px) clamp(14px,3vw,22px);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: clamp(13px,2vw,15px); color: inherit; font-family: 'Poppins', sans-serif;
            transition: background 0.15s, border-color 0.15s;
            touch-action: manipulation; min-height: 48px;
        }
        @media (hover: hover) {
            .inv-item:hover { background: rgba(255,255,255,0.15); border-color: #f5576c; }
        }
        .inv-item:active { background: rgba(255,255,255,0.2); transform: scale(0.97); }
        .inv-item.active-weapon { background: rgba(245,87,108,0.2); border-color: #f5576c; }
        .inv-count {
            background: #f5576c; color: #fff; border-radius: 50%;
            width: 22px; height: 22px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
        }

        /* Target panel */
        .target-panel {
            display: none; margin-top: 16px;
            background: rgba(245,87,108,0.1); border: 2px solid rgba(245,87,108,0.4);
            border-radius: 16px; padding: 14px; animation: fadeIn 0.2s ease;
        }
        .target-panel.active { display: block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

        .target-panel-title {
            text-align: center; color: #f5576c; font-weight: 700;
            font-size: clamp(12px,2.2vw,15px); margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .target-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .target-btn {
            background: rgba(245,87,108,0.15); border: 2px solid rgba(245,87,108,0.5);
            border-radius: 12px; padding: 12px 20px; cursor: pointer;
            color: #fff; font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: clamp(13px,2vw,15px); display: flex; align-items: center; gap: 10px;
            transition: background 0.15s, border-color 0.15s;
            touch-action: manipulation; min-height: 52px; min-width: 100px;
        }
        @media (hover: hover) {
            .target-btn:hover { background: rgba(245,87,108,0.3); border-color: #f5576c; }
        }
        .target-btn:active { background: rgba(245,87,108,0.4); transform: scale(0.97); }
        body.light .target-btn { color: #222; }
        .cancel-target-btn {
            display: block; margin: 12px auto 0;
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 8px 22px; cursor: pointer; color: inherit;
            font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: clamp(12px,2vw,14px); touch-action: manipulation;
        }
        .cancel-target-btn:active { opacity: 0.7; }

        .btn {
            padding: clamp(10px,2vw,14px) clamp(18px,3vw,30px);
            background: linear-gradient(135deg,#4fc3f7,#2196f3); border: none; border-radius: 12px;
            color: #fff; font-size: clamp(13px,2.2vw,16px); font-weight: 700; cursor: pointer;
            font-family: 'Poppins', sans-serif;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
            touch-action: manipulation; min-height: 48px;
        }
        @media (hover: hover) {
            .btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,195,247,0.4); }
        }
        .btn:not(:disabled):active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

        .waiting-msg {
            text-align: center; opacity: 0.7; font-size: clamp(15px,2.8vw,18px);
            padding: 40px 20px; font-weight: 700;
        }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
            padding: clamp(25px,5vw,40px); text-align: center; width: 100%; max-width: 400px;
        }
        .modal h2 { font-size: clamp(22px,4vw,32px); margin-bottom: 20px; }
        .winner-name {
            font-size: clamp(26px,5vw,40px); font-weight: 900;
            background: linear-gradient(90deg,#4fc3f7,#2196f3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 20px 0;
        }

        .host-controls { text-align: center; margin-top: 20px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; z-index: 2000;
            animation: slideUp 0.3s ease; max-width: 90vw; text-align: center; pointer-events: none;
        }
        @keyframes slideUp {
            from { opacity:0; transform: translate(-50%,20px); }
            to   { opacity:1; transform: translate(-50%,0); }
        }

        /* Light mode */
        body.light .phase-name  { text-shadow: 0 2px 8px rgba(0,150,200,0.3); }
        body.light .player-card { background: rgba(255,255,255,0.15); border-color: rgba(0,0,0,0.1); }
        body.light .game-panel  { background: rgba(255,255,255,0.2); }
        body.light .rps-btn     { color: #333; }
        body.light .btn-secondary { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.2); color: #333; }
        body.light .shop-item   { color: #222; }
        body.light .inv-item    { color: #222; }
        body.light .toast       { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="top-bar glass">
        <div class="lobby-info">
            <div class="lobby-name" id="lobby-name">Exile Clash</div>
            <div class="lobby-code">Code: <span id="lobby-code">------</span></div>
        </div>
        <div class="phase-info">
            <div class="phase-name" id="phase-name">Waiting...</div>
        </div>
        <button class="theme-btn glass" id="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-sun"></i> Theme</button>
    </div>

    <div class="game-area">
        <div class="players-grid" id="players-grid"></div>

        <div class="game-panel glass" id="game-panel">
            <div class="waiting-msg" id="waiting-msg">Waiting for host to start...</div>

            <!-- RPS Phase -->
            <div id="rps-phase" style="display:none;">
                <div class="phase-title"><i class="fa-solid fa-hand-fist"></i> Choose Your Weapon</div>
                <div class="rps-choices">
                    <button class="rps-btn" id="btn-rock"     onclick="chooseRPS('rock')">     <div>🪨</div><div class="rps-label">Rock</div></button>
                    <button class="rps-btn" id="btn-paper"    onclick="chooseRPS('paper')">    <div>📄</div><div class="rps-label">Paper</div></button>
                    <button class="rps-btn" id="btn-scissors" onclick="chooseRPS('scissors')"> <div>✂️</div><div class="rps-label">Scissors</div></button>
                </div>
                <div id="rps-waiting" style="display:none;" class="waiting-result">
                    Waiting for others<span class="dots"></span>
                </div>
            </div>

            <!-- Shop Phase -->
            <div id="coin-phase" style="display:none;">
                <div class="phase-title"><i class="fa-solid fa-coins"></i> Shop &amp; Attack Phase</div>
                <div class="shop" id="shop"></div>
                <div class="inventory" id="inventory"></div>

                <!-- Target selection: named buttons appear here when a weapon is active -->
                <div class="target-panel" id="target-panel">
                    <div class="target-panel-title">
                        <i class="fa-solid fa-crosshairs"></i>
                        <span id="target-panel-label">Pick a target</span>
                    </div>
                    <div class="target-buttons" id="target-buttons"></div>
                    <button class="cancel-target-btn" onclick="cancelTarget()">✕ Cancel</button>
                </div>
            </div>

            <div class="host-controls" id="host-controls" style="display:none;">
                <button class="btn" id="start-btn" onclick="startGame()">
                    <i class="fa-solid fa-play"></i> Start Game
                </button>
                <button class="btn btn-secondary" id="next-round-btn" onclick="nextRound()" style="display:none;">
                    <i class="fa-solid fa-forward"></i> Next Round
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="game-over-modal">
        <div class="modal-content glass">
            <h2><i class="fa-solid fa-trophy"></i> Game Over</h2>
            <div class="winner-name" id="winner-name">Player</div>
            <p style="margin-bottom:25px;opacity:0.8;">Winner Winner Chicken Dinner!</p>
            <button class="btn" onclick="location.href='/'">
                <i class="fa-solid fa-house"></i> Back to Lobby
            </button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const API = '/api/game';
        const urlParams    = new URLSearchParams(window.location.search);
        const lobbyId      = urlParams.get('code');
        const userId       = localStorage.getItem('exile_uid');
        const playerName   = localStorage.getItem('exile_player_name') || 'Guest';

        let gameState    = null;
        let pusher       = null;
        let channel      = null;
        let targetMode   = null;
        let gameOverShown = false;
        let rpsChosen    = false; // optimistic lock

        if (!lobbyId || !userId) {
            alert('Invalid game session. Returning to lobby.');
            location.href = '/';
        }

        document.getElementById('lobby-code').textContent = lobbyId;

        /* ─── TOAST NOTIFICATIONS ──────────────────────── */
        function showToast(message, type = 'info', icon = 'fa-info-circle') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} toast-icon"></i>
                <div class="toast-content">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function showKillToast(killerName, victimName) {
            const message = killerName === playerName ? 
                `💀 You killed ${victimName}!` : 
                `💀 ${killerName} killed ${victimName}`;
            showToast(message, 'kill', 'fa-skull');
        }

        function showRoundResultToast(result) {
            if (result === 'win') {
                showToast('🎉 You won the round!', 'round-win', 'fa-crown');
            } else if (result === 'lose') {
                showToast('😢 You lost the round', 'round-lose', 'fa-times-circle');
            } else {
                showToast('🤝 Round was a draw', 'round-draw', 'fa-handshake');
            }
        }

        function showPurchaseToast(itemName, quantity = 1) {
            showToast(`Purchased ${quantity}x ${itemName}`, 'purchase', 'fa-shopping-bag');
        }

        function showPhaseToast(phaseName) {
            showToast(`Phase: ${phaseName}`, 'phase', 'fa-hourglass-end');
        }

        /* ─── THEME ─────────────────────────────────────── */
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('theme-btn');
            const isLight = document.body.classList.contains('light');
            btn.innerHTML = isLight ? '<i class="fa-solid fa-moon"></i> Theme' : '<i class="fa-solid fa-sun"></i> Theme';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            document.getElementById('theme-btn').innerHTML = '<i class="fa-solid fa-moon"></i> Theme';
        }

        /* ─── PUSHER ─────────────────────────────────────── */
        pusher = new Pusher('52d629612765e85a5546', {
            cluster: 'ap2',
            authEndpoint: '/api/pusher/auth',
            auth: { params: { user_info: JSON.stringify({ user_id: userId, username: playerName }) } }
        });

        channel = pusher.subscribe(`game-${lobbyId}`);
        channel.bind('state-update',      () => { if (!gameOverShown) loadGameState(); });
        channel.bind('game-started',      () => { if (!gameOverShown) loadGameState(); });
        channel.bind('rps-resolved',      () => { if (!gameOverShown) loadGameState(); });
        channel.bind('rps-draw', (data)   => {
            rpsChosen = false;
            showToast(data.message || 'Draw! Choose again!');
            if (!gameOverShown) loadGameState();
        });
        channel.bind('host-transferred',  () => {
            showToast('Host transferred');
            if (!gameOverShown) loadGameState();
        });
        channel.bind('game-ended', (data) => showGameOver(data.winner));

        /* ─── API ────────────────────────────────────────── */
        async function apiCall(action, data = {}) {
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, lobby_id: lobbyId, ...data })
                });
                return await res.json();
            } catch (e) {
                console.error('API Error:', e);
                return { error: 'Network error' };
            }
        }

        async function loadGameState() {
            if (gameOverShown) return;
            const res = await apiCall('get_state');
            if (res.error) {
                if (!gameOverShown) {
                    showToast(res.error);
                    setTimeout(() => { if (!gameOverShown) location.href = '/'; }, 2000);
                }
                return;
            }
            gameState = res.lobby;
            if (gameState.phase === 'finished' && !gameOverShown) {
                const alive = gameState.players.filter(p => !p.is_dead);
                showGameOver(alive[0] || null);
                return;
            }
            // Sync rpsChosen with server
            const me = gameState.players.find(p => p.uid === userId);
            if (gameState.phase === 'rps') {
                rpsChosen = !!(me && me.rps_choice);
            }
            renderGame();
        }

        /* ─── RENDER ─────────────────────────────────────── */
        function renderGame() {
            if (!gameState) return;
            document.getElementById('lobby-name').textContent = gameState.name;
            renderPlayers();
            renderPhase();
            renderHostControls();
        }

        function renderPlayers() {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = gameState.players.map(p => {
                const isYou  = p.uid === userId;
                const isDead = p.is_dead;
                const isHost = p.uid === gameState.host_uid;
                const isBot  = p.uid.startsWith('bot_');
                const health = Math.max(0, p.health);
                const dmgCls = health < 4 ? `damage-${4 - health}` : '';
                const shieldsHtml = Array(p.shields || 0).fill(0).map(() => '<div class="shield-icon"></div>').join('');
                let rCls = '';
                if (p.rps_result) rCls = p.rps_result === 'WIN' ? 'result-win' : p.rps_result === 'LOSE' ? 'result-lose' : 'result-draw';

                return `
                    <div class="player-card ${isYou?'you':''} ${isDead?'dead':''} ${isBot?'bot':''}">
                        ${p.rps_result ? `<div class="rps-result ${rCls}">${p.rps_result}</div>` : ''}
                        <div class="shields">${shieldsHtml}</div>
                        <div class="island-wrapper">
                            <div class="island-img ${dmgCls}" style="background-image:url('img/il/${p.island}.png')">
                                <div class="island-damage" style="background-image:url('img/il/${p.island}.png')"></div>
                            </div>
                        </div>
                        <div class="player-info">
                            <div class="player-name">${p.name} ${isYou?'(You)':''} ${isHost?'👑':''} ${isBot?'🤖':''}</div>
                            <div class="player-stats">
                                <div class="stat"><i class="fa-solid fa-heart" style="color:#f5576c"></i> ${health}</div>
                                <div class="stat"><i class="fa-solid fa-coins" style="color:#ffd700"></i> ${p.coins}</div>
                                <div class="stat"><i class="fa-solid fa-bomb" title="Cannon"></i> ${p.canon}</div>
                                <div class="stat"><i class="fa-solid fa-khanda" title="Slicer"></i> ${p.slicer}</div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function renderPhase() {
            const me       = gameState.players.find(p => p.uid === userId);
            const waitMsg  = document.getElementById('waiting-msg');
            const rpsPhase = document.getElementById('rps-phase');
            const coinPhase= document.getElementById('coin-phase');

            waitMsg.style.display  = 'none';
            rpsPhase.style.display = 'none';
            coinPhase.style.display= 'none';

            document.getElementById('phase-name').textContent =
                gameState.phase === 'rps'      ? 'RPS Phase'  :
                gameState.phase === 'coin'     ? 'Shop Phase' :
                gameState.phase === 'finished' ? 'Game Over'  : 'Waiting';

            if (gameState.status === 'waiting') {
                waitMsg.style.display = 'block';
                waitMsg.textContent   = gameState.players.length < 2 ? 'Waiting for players...' : 'Waiting for host to start...';
            } else if (gameState.phase === 'rps' && me && !me.is_dead) {
                rpsPhase.style.display = 'block';
                const chose = rpsChosen || !!me.rps_choice;
                document.getElementById('rps-waiting').style.display = chose ? 'block' : 'none';
                ['rock','paper','scissors'].forEach(c => {
                    const b = document.getElementById('btn-'+c);
                    b.disabled = chose;
                    b.classList.toggle('selected', me.rps_choice === c);
                });
            } else if (gameState.phase === 'coin' && me && !me.is_dead) {
                coinPhase.style.display = 'block';
                renderShop(me);
                renderInventory(me);
                renderTargetPanel(me);
            } else if (me && me.is_dead) {
                waitMsg.style.display = 'block';
                waitMsg.textContent   = '💀 You have been eliminated! Spectating...';
            }
        }

        function renderShop(me) {
            const items = [
                { id:'shields', icon:'🛡️', name:'Shield',  desc:'Block cannon/slicer damage', cost:1, max:3 },
                { id:'canon',   icon:'💣', name:'Cannon',  desc:'Destroy 1 enemy shield',    cost:1, max:3 },
                { id:'slicer',  icon:'⚔️', name:'Slicer',  desc:'Deal 1 dmg if unshielded',  cost:1, max:3 }
            ];
            document.getElementById('shop').innerHTML = items.map(item => {
                const owned  = me[item.id] || 0;
                const canBuy = me.coins >= item.cost && owned < item.max;
                return `<button class="shop-item" onclick="buyItem('${item.id}')" ${!canBuy?'disabled':''}>
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                    <div class="item-cost"><i class="fa-solid fa-coins"></i> ${item.cost}</div>
                    <div class="item-owned">Owned: ${owned}/${item.max}</div>
                </button>`;
            }).join('');
        }

        function renderInventory(me) {
            const inv   = document.getElementById('inventory');
            const items = [];
            if (me.canon  > 0) items.push({ id:'canon',  icon:'💣', name:'Cannon', count:me.canon  });
            if (me.slicer > 0) items.push({ id:'slicer', icon:'⚔️', name:'Slicer', count:me.slicer });

            if (!items.length) {
                inv.innerHTML = '<div style="opacity:0.5;text-align:center;font-size:13px;width:100%;">No weapons — buy some above!</div>';
                return;
            }
            inv.innerHTML = items.map(item => `
                <button class="inv-item ${targetMode===item.id?'active-weapon':''}" onclick="selectTarget('${item.id}')">
                    <span>${item.icon} ${item.name}</span>
                    <span class="inv-count">${item.count}</span>
                </button>`).join('');
        }

        /* ─── TARGET PANEL ───────────────────────────────── */
        function renderTargetPanel(me) {
            const panel = document.getElementById('target-panel');
            if (!targetMode) { panel.classList.remove('active'); return; }

            const weaponLabel = targetMode === 'canon' ? '💣 Cannon' : '⚔️ Slicer';
            document.getElementById('target-panel-label').textContent = `Use ${weaponLabel} on…`;

            const enemies = gameState.players.filter(p => !p.is_dead && p.uid !== userId);
            document.getElementById('target-buttons').innerHTML = enemies.length
                ? enemies.map(p => {
                    const shieldStr = p.shields > 0 ? ` 🛡️×${p.shields}` : '';
                    return `<button class="target-btn" onclick="useItemOn('${p.uid}')">
                        <span>${p.name}${shieldStr}</span>
                        <span style="opacity:0.6;font-size:12px;">❤️${Math.max(0,p.health)}</span>
                    </button>`;
                }).join('')
                : '<div style="opacity:0.5;text-align:center;">No valid targets</div>';

            panel.classList.add('active');
        }

        /* ─── ACTIONS ─────────────────────────────────────── */
        async function startGame() {
            const res = await apiCall('start_game');
            if (res.error) showToast(res.error);
        }

        async function chooseRPS(choice) {
            if (rpsChosen) return;
            rpsChosen = true;

            // Instant optimistic UI
            ['rock','paper','scissors'].forEach(c => {
                const b = document.getElementById('btn-'+c);
                b.disabled = true;
                b.classList.toggle('selected', c === choice);
            });
            document.getElementById('rps-waiting').style.display = 'block';

            const res = await apiCall('rps_choice', { uid: userId, choice });
            if (res.error) {
                showToast(res.error);
                // Rollback
                rpsChosen = false;
                ['rock','paper','scissors'].forEach(c => {
                    const b = document.getElementById('btn-'+c);
                    b.disabled = false;
                    b.classList.remove('selected');
                });
                document.getElementById('rps-waiting').style.display = 'none';
            }
        }

        async function buyItem(item) {
            const res = await apiCall('buy_item', { uid: userId, item });
            if (res.error) showToast(res.error);
        }

        function selectTarget(item) {
            targetMode = item;
            const me = gameState && gameState.players.find(p => p.uid === userId);
            if (me) { renderInventory(me); renderTargetPanel(me); }
        }

        function cancelTarget() {
            targetMode = null;
            document.getElementById('target-panel').classList.remove('active');
            const me = gameState && gameState.players.find(p => p.uid === userId);
            if (me) renderInventory(me);
        }

        async function useItemOn(targetUid) {
            if (!targetMode) return;
            const item = targetMode;
            targetMode = null;
            document.getElementById('target-panel').classList.remove('active');
            const res = await apiCall('use_item', { uid: userId, item, target_uid: targetUid });
            if (res.error) showToast(res.error);
        }

        async function nextRound() {
            await apiCall('next_round');
        }

        /* ─── HELPERS ─────────────────────────────────────── */
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function showGameOver(winner) {
            gameOverShown = true;
            document.getElementById('winner-name').textContent = winner ? winner.name : 'No Winner';
            document.getElementById('game-over-modal').classList.add('active');
        }

        /* ─── INIT ────────────────────────────────────────── */
        loadGameState();
        setInterval(() => { if (!gameOverShown) loadGameState(); }, 5000);
    </script>
</body>
</html>
